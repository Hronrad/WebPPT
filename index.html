<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebPPT - Tri-Engine Interactive Deck</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

    <!-- Babel -->

    <!-- Framer Motion -->
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- KaTeX for Math Rendering -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=JetBrains+Mono:wght@400;700&family=Noto+Serif+SC:wght@400;700&family=Inter:wght@400;600&family=Space+Grotesk:wght@400;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">

    <style>
        body { margin: 0; overflow: hidden; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        .font-cyber { font-family: 'Orbitron', sans-serif; }
        .font-academic-serif { font-family: 'Noto Serif SC', serif; }
        .font-academic-sans { font-family: 'Inter', sans-serif; }
        .font-syne { font-family: 'Syne', sans-serif; }
        .font-space { font-family: 'Space Grotesk', sans-serif; }

        #root { width: 100vw; height: 100vh; }
        ::-webkit-scrollbar { display: none; }

        input[type=range] { -webkit-appearance: none; background: transparent; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 16px; width: 16px; border-radius: 50%; background: currentColor; cursor: pointer; margin-top: -6px; }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 4px; cursor: pointer; background: rgba(128,128,128,0.3); border-radius: 2px; }

        @keyframes gradient-xy {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .dream-gradient-bg {
            background: linear-gradient(-45deg, #FF00FF, #7DF9FF, #B026FF, #FFE600);
            background-size: 400% 400%;
            animation: gradient-xy 15s ease infinite;
        }

        @keyframes marquee {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }
        .animate-marquee { display: inline-block; white-space: nowrap; animation: marquee 20s linear infinite; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        const { motion, AnimatePresence } = window.Motion;

        // --- 图标组件 ---
        const IconTerminal = ({ size=24, color="currentColor" }) => (<svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="4 17 10 11 4 5"></polyline><line x1="12" y1="19" x2="20" y2="19"></line></svg>);
        const IconCpu = ({ size=24, color="currentColor", className="" }) => (<svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="4" y="4" width="16" height="16" rx="2" ry="2"></rect><rect x="9" y="9" width="6" height="6"></rect><line x1="9" y1="1" x2="9" y2="4"></line><line x1="15" y1="1" x2="15" y2="4"></line><line x1="9" y1="20" x2="9" y2="23"></line><line x1="15" y1="20" x2="15" y2="23"></line><line x1="20" y1="9" x2="23" y2="9"></line><line x1="20" y1="14" x2="23" y2="14"></line><line x1="1" y1="9" x2="4" y2="9"></line><line x1="1" y1="14" x2="4" y2="14"></line></svg>);
        const IconNetwork = ({ size=24, color="currentColor" }) => (<svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="16" y="16" width="6" height="6" rx="1"></rect><rect x="2" y="16" width="6" height="6" rx="1"></rect><rect x="9" y="2" width="6" height="6" rx="1"></rect><path d="M5 16v-3a1 1 0 0 1 1-1h12a1 1 0 0 1 1 1v3"></path><path d="M12 12V8"></path></svg>);
        const IconZap = ({ size=24, color="currentColor", className="" }) => (<svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon></svg>);
        const IconMaximize = ({ size=24, color="currentColor" }) => (<svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"></path></svg>);
        const IconMinimize = ({ size=24, color="currentColor" }) => (<svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M8 3v3a2 2 0 0 1-2 2H3m18 0h-3a2 2 0 0 1-2-2V3m0 18v-3a2 2 0 0 1 2-2h3M3 16h3a2 2 0 0 1 2 2v3"></path></svg>);
        const IconPalette = ({ size=24, color="currentColor" }) => (<svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="13.5" cy="6.5" r=".5" fill="currentColor"></circle><circle cx="17.5" cy="10.5" r=".5" fill="currentColor"></circle><circle cx="8.5" cy="7.5" r=".5" fill="currentColor"></circle><circle cx="6.5" cy="12.5" r=".5" fill="currentColor"></circle><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10c.926 0 1.648-.746 1.648-1.688 0-.437-.18-.835-.437-1.125-.29-.289-.438-.652-.438-1.125a1.64 1.64 0 0 1 1.668-1.668h1.996c3.051 0 5.555-2.503 5.555-5.554C21.965 6.012 17.461 2 12 2z"></path></svg>);
        const IconFingerprint = ({ size=24, color="currentColor" }) => (<svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M2 12C2 6.5 6.5 2 12 2a10 10 0 0 1 8 4"></path><path d="M5 19.5C5.5 18 6 15 6 11.5a6 6 0 0 1 12.01-.36"></path><path d="M12 22v-3"></path><path d="M9 20a4 4 0 0 1 6-2"></path><path d="M12 7.5a4.5 4.5 0 0 0-4.5 4.5c0 1.5.5 4 1.5 6"></path><path d="M15 17.5c-.5-1.5-1-4-1-6.5a2.5 2.5 0 0 0-5 0"></path></svg>);
        const IconCheck = ({ size=24, color="currentColor" }) => (<svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>);
        const IconChevronLeft = ({ size=24, color="currentColor" }) => (<svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>);
        const IconChevronRight = ({ size=24, color="currentColor" }) => (<svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>);
        const IconChevronDown = ({ size=24, color="currentColor", className="" }) => (<svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>);
        const IconMenu = ({ size=24, color="currentColor" }) => (<svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>);
        const IconStar = ({ size=24, color="currentColor", className="" }) => (<svg width={size} height={size} className={className} viewBox="0 0 24 24" fill={color} stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>);
        const IconX = ({ size=24, color="currentColor", className="" }) => (<svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>);

        // --- LaTeX 公式渲染组件 ---
        const MathTex = ({ tex, displayMode = false, className = "" }) => {
            const html = window.katex ? window.katex.renderToString(tex, { throwOnError: false, displayMode }) : tex;
            return <span className={className} dangerouslySetInnerHTML={{ __html: html }} />;
        };

        // --- 乱码解码文字动效 ---
        const DecryptedText = ({ text, delay = 0, className = "", enabled = true, glitchColor = null }) => {
            const [displayText, setDisplayText] = useState('');
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%^&*()';
            useEffect(() => {
                if (!enabled) { setDisplayText(text); return; }
                let iteration = 0;
                let interval = null;
                const startAnimation = () => {
                    interval = setInterval(() => {
                        setDisplayText(text.split('').map((letter, index) => {
                            if (index < iteration) return letter;
                            return chars[Math.floor(Math.random() * chars.length)];
                        }).join(''));
                        if (iteration >= text.length) clearInterval(interval);
                        iteration += 1 / 2;
                    }, 30);
                };
                const timer = setTimeout(startAnimation, delay);
                return () => { clearTimeout(timer); clearInterval(interval); };
            }, [text, delay, enabled]);

            if (glitchColor && displayText !== text && enabled) {
                return <span className={className} style={{ color: glitchColor, textShadow: `2px 2px 0px ${glitchColor}80` }}>{displayText || text.replace(/./g, '_')}</span>;
            }
            return <span className={className}>{displayText || (enabled ? text.replace(/./g, '_') : text)}</span>;
        };

        // --- 纯 CSS 3D 量子态核心 (用于大型产品展示) ---
        const QuantumCore = ({ theme }) => {
            const isC = theme.id === 'cyber';
            const isD = theme.id === 'dreamcore';
            const isA = theme.id === 'academic';

            return (
                <div className="relative flex items-center justify-center w-64 h-64 md:w-[400px] md:h-[400px]" style={{ perspective: '1200px' }}>
                    <motion.div
                        className="absolute inset-0 w-full h-full"
                        animate={{ rotateX: [0, 360], rotateY: [0, 180], rotateZ: [0, 360] }}
                        transition={{ duration: 30, repeat: Infinity, ease: "linear" }}
                        style={{ transformStyle: 'preserve-3d' }}
                    >
                        {/* 环 1 */}
                        <div className={`absolute inset-0 m-auto w-full h-full rounded-full ${isD ? 'border-8 border-dashed' : (isC ? 'border-8 border-solid' : 'border-4 border-solid')}`}
                             style={{ borderColor: isD ? '#FF00FF' : theme.primary, opacity: isA ? 0.2 : 0.8, transform: 'rotateX(0deg) rotateY(45deg)', boxShadow: isC ? `0 0 20px ${theme.primary}, inset 0 0 20px ${theme.primary}` : 'none' }}></div>

                        {/* 环 2 */}
                        <div className={`absolute inset-0 m-auto w-[85%] h-[85%] rounded-full ${isD ? 'border-8 border-dotted' : (isC ? 'border-[6px] border-solid' : 'border-2 border-solid')}`}
                             style={{ borderColor: isD ? '#7DF9FF' : theme.secondary, opacity: isA ? 0.3 : 1, transform: 'rotateX(60deg) rotateY(0deg) rotateZ(30deg)', boxShadow: isC ? `0 0 15px ${theme.secondary}, inset 0 0 15px ${theme.secondary}` : 'none' }}></div>

                        {/* 环 3 */}
                        <div className={`absolute inset-0 m-auto w-[70%] h-[70%] rounded-full ${isD ? 'border-[12px] border-dashed' : (isC ? 'border-4 border-solid' : 'border-4 border-solid')}`}
                             style={{ borderColor: isD ? '#FFE600' : (isC ? 'rgba(255,255,255,0.8)' : theme.primary), opacity: isA ? 0.1 : 0.6, transform: 'rotateX(30deg) rotateY(90deg)', boxShadow: isC ? `0 0 10px white` : 'none' }}></div>
                    </motion.div>

                    {/* 中心悬浮物 */}
                    <motion.div
                        className={`relative z-10 flex items-center justify-center w-24 h-24 md:w-32 md:h-32 ${isA ? 'bg-white shadow-xl border border-gray-100 rounded-full' : (isD ? 'bg-black border-4 border-[#FFE600] rounded-2xl' : 'bg-black border border-[#00F3FF] rounded-[2rem]')}`}
                        style={{ boxShadow: isD ? '8px 8px 0 #FF00FF' : (isC ? `0 0 40px ${theme.secondary}` : '0 10px 30px rgba(0,0,0,0.1)') }}
                        animate={{ y: [-15, 15, -15], rotate: [0, 10, -10, 0] }}
                        transition={{ duration: 6, repeat: Infinity, ease: "easeInOut" }}
                    >
                        {isD ? <IconStar size={64} color="#7DF9FF" /> : (isC ? <IconCpu size={64} color={theme.primary} /> : <MathTex tex="\Psi" displayMode={true} className="text-6xl text-[#4B0082] m-0 leading-none" />)}
                    </motion.div>
                </div>
            );
        };

        // --- 背景组件 ---
        const ParticleGrid = ({ primaryColor }) => (
            <div className="absolute inset-0 z-0 overflow-hidden pointer-events-none opacity-30 transition-colors duration-700">
                <div className="absolute inset-0 animate-[pulse_4s_ease-in-out_infinite]" style={{ backgroundImage: `radial-gradient(circle at center, ${primaryColor} 1px, transparent 1px)`, backgroundSize: '40px 40px' }} />
                <div className="absolute inset-0 bg-black/80" />
            </div>
        );

        const DreamcoreBackground = () => (
            <div className="absolute inset-0 z-0 overflow-hidden pointer-events-none">
                <div className="absolute inset-0 dream-gradient-bg opacity-80"></div>
                <div className="absolute inset-0 bg-[url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI4IiBoZWlnaHQ9IjgiPgo8cmVjdCB3aWR0aD0iOCIgaGVpZ2h0PSI4IiBmaWxsPSIjZmZmIiBmaWxsLW9wYWNpdHk9IjAuMDUiLz4KPHBhdGggZD0iTTAgMGg4djhIMHoiIGZpbGw9Im5vbmUiIHN0cm9rZT0iI2ZmZiIgc3Ryb2tlLW9wYWNpdHk9IjAuMSIvPgo8L3N2Zz4=')]"></div>
                <motion.div animate={{ y: [0, -30, 0], rotate: [0, 10, 0] }} transition={{ repeat: Infinity, duration: 8, ease: "easeInOut" }} className="absolute top-20 left-20 opacity-40"><IconStar size={120} color="#FFE600" /></motion.div>
                <motion.div animate={{ y: [0, 40, 0], rotate: [0, -15, 0] }} transition={{ repeat: Infinity, duration: 12, ease: "easeInOut" }} className="absolute bottom-20 right-32 opacity-30"><IconStar size={200} color="#00F3FF" /></motion.div>
            </div>
        );

        // --- 洛伦兹吸引子 Canvas 渲染器 ---
        const LorenzCanvas = ({ sigma, rho, beta, theme }) => {
            const canvasRef = useRef(null);
            const paramsRef = useRef({ sigma, rho, beta });

            useEffect(() => {
                paramsRef.current = { sigma, rho, beta };
            }, [sigma, rho, beta]);

            useEffect(() => {
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                let animationFrameId;
                let x = 0.1, y = 0, z = 0;

                ctx.clearRect(0, 0, canvas.width, canvas.height);
                const fadeColor = theme.id === 'cyber' ? 'rgba(5, 5, 5, 0.012)' : (theme.id === 'dreamcore' ? 'rgba(30, 10, 50, 0.018)' : 'rgba(248, 249, 250, 0.012)');
                const strokeColor = theme.primary;

                const draw = () => {
                    const dt = 0.005;
                    ctx.beginPath();
                    const scale = 7;
                    const offsetX = canvas.width / 2;
                    const offsetY = canvas.height - 30;

                    ctx.moveTo(offsetX + x * scale, offsetY - z * scale);
                    for(let i = 0; i < 8; i++) {
                        const { sigma: s, rho: r, beta: b } = paramsRef.current;
                        const dx = s * (y - x);
                        const dy = x * (r - z) - y;
                        const dz = x * y - b * z;
                        x += dx * dt;
                        y += dy * dt;
                        z += dz * dt;
                        ctx.lineTo(offsetX + x * scale, offsetY - z * scale);
                    }
                    ctx.strokeStyle = strokeColor;
                    ctx.lineWidth = 1.2;
                    ctx.stroke();

                    ctx.fillStyle = fadeColor;
                    ctx.fillRect(0, 0, canvas.width, canvas.height);

                    animationFrameId = window.requestAnimationFrame(draw);
                };
                draw();
                return () => window.cancelAnimationFrame(animationFrameId);
            }, [theme]);

            let blendModeClass = 'mix-blend-multiply';
            if (theme.id === 'cyber') blendModeClass = 'mix-blend-screen';
            if (theme.id === 'dreamcore') blendModeClass = 'mix-blend-screen opacity-90';

            return <canvas ref={canvasRef} width={600} height={400} className={`w-full h-full object-contain ${blendModeClass}`} />;
        };

        // --- 三大引擎配置 ---
        const THEMES = {
            academic: { id: 'academic', name: 'Academic', primary: '#4B0082', secondary: '#004b87', bg: '#F8F9FA', text: 'text-gray-900', fontTitle: 'font-academic-serif', fontBody: 'font-academic-sans' },
            cyber: { id: 'cyber', name: 'Web3 Cyber', primary: '#39FF14', secondary: '#00F3FF', bg: '#050505', text: 'text-white', fontTitle: 'font-cyber', fontBody: 'font-mono' },
            dreamcore: { id: 'dreamcore', name: 'Y2K Dreamcore', primary: '#FF00FF', secondary: '#7DF9FF', bg: '#1E0A32', text: 'text-white', fontTitle: 'font-syne', fontBody: 'font-space' }
        };

        const THEMES_ARRAY = [THEMES.academic, THEMES.cyber, THEMES.dreamcore];

        // --- 幻灯片导航配置 ---
        const SLIDE_TITLES = [
            "首选项与概览",
            "核心模型展示",
            "基础计算架构",
            "协同网络指标",
            "非线性动力系统",
            "核心文献演进"
        ];
        const SLIDE_SECTIONS = [
            { start: 0, title: "开场设置" },
            { start: 1, title: "核心展示" },
            { start: 2, title: "架构指标" },
            { start: 4, title: "动态演示" },
            { start: 5, title: "文献脉络" }
        ];
        const TOTAL_SLIDES = SLIDE_TITLES.length;

        // --- 主程序 ---
        const Web3GeekDeck = () => {
            const [currentSlide, setCurrentSlide] = useState(0);
            const [direction, setDirection] = useState(1);
            const [theme, setTheme] = useState(THEMES.dreamcore);
            const [showWatermark, setShowWatermark] = useState(true);
            const [isFullscreen, setIsFullscreen] = useState(false);
            const [isSidebarOpen, setIsSidebarOpen] = useState(true);
            const containerRef = useRef(null);

            const [lorenzParams, setLorenzParams] = useState({ sigma: 10, rho: 28, beta: 8/3 });
            const [expandedTimelineId, setExpandedTimelineId] = useState('2026');

            const reportData = {
                title: "WEB3 与量子态计算的基础架构",
                subtitle: "Web3 AI Era: Next-Gen Infrastructure",
                presenter: "南京大学物理与人工智能实验室",
                date: "2026年5月"
            };

            const timelineData = [
                { id: '2009', year: '2009', isRed: false, title: 'Palmer, T. N. (2009). The Invariant Set Postulate...', desc: '提出“不变集理论”，用分形吸引子替代希尔伯特空间，并引入引力自能作为离散度的解释机制，解释宏观客观坍缩。' },
                { id: '2014', year: '2014', isRed: false, title: 'Palmer, T. N. (2014). Lorenz, Gödel and Penrose...', desc: '结合洛伦兹混沌、哥德尔不完备定理与彭罗斯坍缩，证明决定论分形兼容因果律，回应“超决定论”的阴谋论批评。' },
                { id: '2020', year: '2020', isRed: false, title: 'Palmer, T. N. (2020). Discretisation of the Bloch Sphere...', desc: '实现布洛赫球面的有理数离散化。利用数论证明反事实推理在分形几何中会落入无理数缝隙，由此质疑贝尔不等式在该几何框架中的适用性。' },
                { id: '2026', year: '2026', isRed: true, title: 'Palmer, T. (2026). Rational quantum mechanics...', desc: <>定名“有理量子力学”（RaQM）。量化希尔伯特空间维度上限（<MathTex tex="N_{max} \approx 200-400" />），预言量子计算机可能因底层物理容量限制而出现非幺正散粒噪声，提出 Shor 算法物理可实现性受限的预言。</> }
            ];

            useEffect(() => {
                const handleKeyDown = (e) => {
                    if (e.target.tagName === 'INPUT') return;
                    if (e.key === 'ArrowRight' || e.key === 'Space' || e.key === ' ') {
                        setDirection(1);
                        setCurrentSlide((prev) => Math.min(prev + 1, TOTAL_SLIDES - 1));
                    } else if (e.key === 'ArrowLeft') {
                        setDirection(-1);
                        setCurrentSlide((prev) => Math.max(prev - 1, 0));
                    }
                };
                window.addEventListener('keydown', handleKeyDown);
                return () => window.removeEventListener('keydown', handleKeyDown);
            }, []);

            useEffect(() => {
                const syncFullscreenState = () => {
                    setIsFullscreen(Boolean(document.fullscreenElement));
                };
                document.addEventListener('fullscreenchange', syncFullscreenState);
                return () => document.removeEventListener('fullscreenchange', syncFullscreenState);
            }, []);

            useEffect(() => {
                const exitPseudoFullscreen = (e) => {
                    if (e.key === 'Escape' && isFullscreen && !document.fullscreenElement) {
                        setIsFullscreen(false);
                    }
                };
                window.addEventListener('keydown', exitPseudoFullscreen);
                return () => window.removeEventListener('keydown', exitPseudoFullscreen);
            }, [isFullscreen]);

            const toggleFullscreen = () => {
                if (document.fullscreenEnabled) {
                    if (!document.fullscreenElement) {
                        containerRef.current?.requestFullscreen().then(() => setIsFullscreen(true)).catch(() => setIsFullscreen(true));
                    } else {
                        document.exitFullscreen().then(() => setIsFullscreen(false)).catch(() => setIsFullscreen(false));
                    }
                } else {
                    setIsFullscreen(!isFullscreen);
                }
            };

                        const rect = currentTarget.getBoundingClientRect();

                        const rawValue = item.min + ratio * (item.max - item.min);

                        updateLorenzParam(item.key, Number(steppedValue.toFixed(4)));

                                    aria-valuemin={item.min}

                    )}

                    {/* 主展示区 */}
                    <div className="relative flex-grow flex flex-col z-10 overflow-hidden">
                        {/* 顶部进度导航 */}
                        <header className={`relative p-4 md:p-6 flex justify-between items-center z-40 border-b transition-colors duration-700
                            ${isD ? 'bg-black border-b-4 border-black shadow-[0_4px_0_#7DF9FF]' : (isC ? 'bg-black/40 backdrop-blur-xl border-[#39FF14]33' : 'bg-white/80 backdrop-blur-md border-gray-200 shadow-sm')}`}>
                            <div className={`text-xs md:text-sm tracking-widest flex items-center gap-2 md:gap-3 ${isD ? 'font-space font-bold text-[#FFE600]' : (isC ? `font-mono text-[${theme.primary}]` : 'font-academic-sans text-[#4B0082]')}`} style={isC ? {color: theme.primary} : {}}>
                                {isC ? (<span className="w-2.5 h-2.5 rounded-full animate-pulse" style={{ backgroundColor: theme.primary, boxShadow: `0 0 10px ${theme.primary}` }} />) : (<span className="w-2.5 h-2.5 rounded-sm" style={{ backgroundColor: isD ? '#FF00FF' : theme.primary }} />)}
                                <span className="hidden md:inline font-bold">{isD ? "NEO_DREAM_OS v9.9" : (isC ? <DecryptedText text="SYS.NEURAL_NET // RUNNING" delay={100} enabled={true} /> : "NJU Academic Presentation Framework")}</span>
                            </div>
                            <div className="flex gap-2 md:gap-3">
                                {SLIDE_TITLES.map((_, i) => (
                                    <div key={i} className={`relative h-2 md:h-3 w-6 md:w-10 lg:w-14 rounded-full overflow-hidden border ${isD ? 'bg-white border-black border-2' : (isC ? 'bg-gray-800 border-none h-1.5' : 'bg-gray-200 border-none h-1.5')}`}>
                                        {i === currentSlide && (
                                            <motion.div layoutId="activeSlideProgress" className="absolute inset-0"
                                                style={{
                                                    backgroundColor: isA ? theme.primary : (isD ? '#FF00FF' : undefined),
                                                    backgroundImage: isC ? `linear-gradient(to right, ${theme.primary}, ${theme.secondary})` : undefined,
                                                    boxShadow: isC ? `0 0 10px ${theme.secondary}CC` : undefined
                                                }}
                                                transition={!isA ? { type: 'spring', stiffness: 300, damping: 30 } : { type: 'tween' }}
                                            />
                                        )}
                                    </div>
                                ))}
                            </div>
                        </header>

                        {/* 幻灯片内容区 */}
                        <main className="relative flex-grow flex items-center justify-center overflow-hidden">
                            <AnimatePresence initial={false} custom={direction} mode="popLayout">
                                <motion.div key={currentSlide} custom={direction} variants={slideVariants} initial="enter" animate="center" exit="exit" className="absolute inset-0 p-8 flex flex-col justify-center max-w-6xl mx-auto w-full">
                                    {renderSlideContent(currentSlide)}
                                </motion.div>
                            </AnimatePresence>
                        </main>

                        {!isFullscreen && (
                            <footer className={`relative p-4 md:p-6 z-40 text-[10px] md:text-xs flex justify-between items-center border-t transition-colors duration-700
                                ${isD ? 'font-space font-bold bg-white text-black border-t-4 border-black' : (isC ? 'font-mono text-gray-500 bg-gradient-to-t from-black via-black/80 to-transparent border-white/5' : 'font-academic-sans text-gray-400 bg-white/50 border-gray-100')}`}>
                                <div className="hidden md:block">
                                    {isD ? ">>> EXPLORE THE VIRTUAL SPACE <<<" : (isC ? <DecryptedText text="USE [ARROW_KEYS] TO NAVIGATE NODES" delay={1500} enabled={true} /> : "Keyboard Navigation Enabled: [Arrow Left] / [Arrow Right]")}
                                </div>
                                <div className="md:hidden">SWIPE/TAP</div>
                                <div>
                                    <span className="mr-3">{currentSlide + 1}/{TOTAL_SLIDES}</span>
                                    {isD ? "DREAM_ENGINE.EXE" : (isC ? <DecryptedText text="RENDER_ENGINE: INTERACTIVE_UI" delay={1800} enabled={true} /> : "Powered by Tri-Engine UI v4.0")}
                                </div>
                            </footer>
                        )}
                    </div>

                    {/* 悬浮中控面板 */}
                    <div className={`absolute bottom-16 md:bottom-6 right-4 md:right-8 z-50 flex gap-3 md:gap-4 px-4 py-2 md:px-5 md:py-3 border rounded-2xl shadow-lg transition-all
                        ${isD ? 'bg-[#FFE600] border-4 border-black shadow-[4px_4px_0_#B026FF] hover:shadow-[6px_6px_0_#FF00FF]' : (isC ? 'bg-black/50 backdrop-blur-xl border-white/10 hover:bg-black/80 hover:border-white/20' : 'bg-white border-gray-200 hover:shadow-xl')}`}>
                        <button onClick={goToPreviousSlide} disabled={currentSlide === 0} className={`transition-colors disabled:opacity-30 disabled:cursor-not-allowed ${isD ? 'text-black hover:text-[#00F3FF]' : (isC ? 'text-gray-400 hover:text-white' : 'text-gray-500 hover:text-indigo-800')}`} title="上一页">
                            <IconChevronLeft size={20} />
                        </button>
                        <button onClick={goToNextSlide} disabled={currentSlide === TOTAL_SLIDES - 1} className={`transition-colors disabled:opacity-30 disabled:cursor-not-allowed ${isD ? 'text-black hover:text-[#00F3FF]' : (isC ? 'text-gray-400 hover:text-white' : 'text-gray-500 hover:text-indigo-800')}`} title="下一页">
                            <IconChevronRight size={20} />
                        </button>
                        <div className={`w-px h-5 self-center mx-1 ${isD ? 'bg-black border-l border-black' : (isC ? 'bg-white/20' : 'bg-gray-300')}`} />
                        <button onClick={handleThemeToggle} className={`transition-colors ${isD ? 'text-black hover:text-[#FF00FF]' : (isC ? 'text-gray-400 hover:text-white' : 'text-gray-500 hover:text-indigo-800')}`} title="切换展示引擎 (Academic/Cyber/Dreamcore)">
                            <IconPalette size={20} />
                        </button>
                        <button onClick={() => setShowWatermark(!showWatermark)} className={`transition-colors ${showWatermark ? (isC ? 'text-white' : (isD ? 'text-[#B026FF]' : 'text-indigo-800')) : (isD ? 'text-black/30' : 'text-gray-500')}`} title="切换水印保护">
                            <IconFingerprint size={20} />
                        </button>
                        <div className={`w-px h-5 self-center mx-1 ${isD ? 'bg-black border-l border-black' : (isC ? 'bg-white/20' : 'bg-gray-300')}`} />
                        <button onClick={toggleFullscreen} className={`transition-colors ${isD ? 'text-black hover:text-[#00F3FF]' : (isC ? 'text-gray-400 hover:text-white' : 'text-gray-500 hover:text-indigo-800')}`} title="全屏演示">
                            {isFullscreen ? <IconMinimize size={20} /> : <IconMaximize size={20} />}
                        </button>
                    </div>

                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<Web3GeekDeck />);
    </script>
</body>
</html>
